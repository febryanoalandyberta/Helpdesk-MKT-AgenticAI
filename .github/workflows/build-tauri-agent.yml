name: Build Tauri Agent (Windows)

on:
  push:
    paths:
      - 'hardware_agent/**'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Frontend Dependencies
        working-directory: ./hardware_agent
        run: npm install

      - name: Download Missing Icons
        working-directory: ./hardware_agent/src-tauri
        run: |
          mkdir -p icons
          curl -L "https://raw.githubusercontent.com/tauri-apps/tauri/dev/tooling/cli/init/templates/src-tauri/icons/icon.ico" -o icons/icon.ico
          curl -L "https://raw.githubusercontent.com/tauri-apps/tauri/dev/tooling/cli/init/templates/src-tauri/icons/32x32.png" -o icons/32x32.png
          curl -L "https://raw.githubusercontent.com/tauri-apps/tauri/dev/tooling/cli/init/templates/src-tauri/icons/128x128.png" -o icons/128x128.png
          curl -L "https://raw.githubusercontent.com/tauri-apps/tauri/dev/tooling/cli/init/templates/src-tauri/icons/128x128@2x.png" -o icons/128x128@2x.png
          curl -L "https://raw.githubusercontent.com/tauri-apps/tauri/dev/tooling/cli/init/templates/src-tauri/icons/icon.icns" -o icons/icon.icns

      - name: Build Tauri App
        working-directory: ./hardware_agent
        run: npm run tauri build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MKT_Hardware_Agent_Installer
          path: hardware_agent/src-tauri/target/release/bundle/nsis/*.exe
