name: Build Tauri Agent (Windows)

on:
  push:
    paths:
      - 'hardware_agent/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Frontend Dependencies
        working-directory: ./hardware_agent
        run: npm install

      - name: Build Tauri App
        working-directory: ./hardware_agent
        run: npm run tauri build

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          $v = (Get-Content hardware_agent/src-tauri/tauri.conf.json | ConvertFrom-Json).package.version
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Rename installer to avoid spaces in filename
        shell: pwsh
        run: |
          $src = Get-ChildItem -Path "hardware_agent/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          Write-Host "Source: $($src.FullName)"
          Copy-Item $src.FullName -Destination "MKT_Hardware_Agent_setup.exe"
          Write-Host "Renamed to: MKT_Hardware_Agent_setup.exe"

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: hardware-agent-v${{ steps.get_version.outputs.VERSION }}
          name: "MKT Hardware Agent v${{ steps.get_version.outputs.VERSION }}"
          body: "Installer MKT Hardware Agent versi ${{ steps.get_version.outputs.VERSION }} untuk Windows."
          files: MKT_Hardware_Agent_setup.exe
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
