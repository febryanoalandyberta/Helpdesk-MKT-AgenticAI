name: Build Tauri Agent (Windows)

on:
  push:
    paths:
      - 'hardware_agent/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Frontend Dependencies
        working-directory: ./hardware_agent
        run: npm install

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: hardware_agent
          tagName: hardware-agent-v__VERSION__
          releaseName: "MKT Hardware Agent v__VERSION__"
          releaseBody: "Automated Release dari GitHub Actions."
          releaseDraft: false
          prerelease: false

