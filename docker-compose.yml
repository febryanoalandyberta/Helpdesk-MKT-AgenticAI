version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mkt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: helpdesk_mkt
      POSTGRES_USER: mkt_user
      POSTGRES_PASSWORD: mkt_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mkt_user -d helpdesk_mkt" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mkt_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── ChromaDB ────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: mkt_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false

  # ─── Backend API ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mkt_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://mkt_user:mkt_password@postgres:5432/helpdesk_mkt
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./frontend:/app/../frontend

  # ─── AI Engine (CrewAI) ──────────────────
  crewai:
    build:
      context: ./crewai_agents
      dockerfile: Dockerfile
    container_name: mkt_crewai
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - ./crewai_agents/.env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      chromadb:
        condition: service_started
    volumes:
      - ./crewai_agents:/app

volumes:
  postgres_data:
  redis_data:
  chroma_data:
