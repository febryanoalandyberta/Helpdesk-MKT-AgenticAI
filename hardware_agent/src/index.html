<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>MKT AI Helpdesk Chat</title>
  <style>
    body {
      margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); color: #fff;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }
    .header {
      background: rgba(30, 41, 59, 0.8); padding: 15px; text-align: center; font-weight: bold;
      border-bottom: 1px solid #38bdf8;
      -webkit-app-region: drag; user-select: none; cursor: default;
    }
    .chat-container {
      flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
    }
    .msg {
      max-width: 80%; padding: 10px 15px; border-radius: 12px; font-size: 14px; line-height: 1.4;
    }
    .msg-user {
      align-self: flex-end; background: #38bdf8; color: #000; border-bottom-right-radius: 2px;
    }
    .msg-ai {
      align-self: flex-start; background: #1e293b; color: #e2e8f0; border-bottom-left-radius: 2px; border: 1px solid #334155;
    }
    .input-area {
      padding: 15px; background: rgba(30, 41, 59, 0.8); display: flex; gap: 10px;
    }
    input {
      flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff;
    }
    input:focus { outline: none; border-color: #38bdf8; }
    button {
      padding: 10px 20px; background: #38bdf8; color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header" data-tauri-drag-region>⚡ MKT AI Agentic Helpdesk</div>
  <div class="chat-container" id="chat">
    <div class="msg msg-ai">Halo! Saya asisten AI dari IT Helpdesk. Ada kendala yang bisa saya bantu hari ini? Laporan Anda akan langsung masuk ke sistem tiket.</div>
  </div>
  <div class="input-area">
    <input type="text" id="msgInput" placeholder="Ketik pesan masalah Anda..." autofocus>
    <button onclick="sendMessage()">Kirim</button>
  </div>
  
  <script>
    const { invoke } = window.__TAURI__.tauri;
    const chat = document.getElementById('chat');
    const input = document.getElementById('msgInput');

    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = `msg ${isUser ? 'msg-user' : 'msg-ai'}`;
      div.innerText = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      
      addMessage(text, true);
      input.value = '';
      
      try {
        const response = await invoke('send_chat_message', { message: text });
        addMessage(response, false);
      } catch (e) {
        addMessage("❌ Gagal terhubung ke server. " + e, false);
      }
    }

    input.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
