<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>MKT AI Helpdesk Chat</title>
  <style>
    body {
      margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: rgba(15, 23, 42, 0.95); color: #fff;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }
    .header {
      background: rgba(30, 41, 59, 0.95); padding: 12px 15px; text-align: center; font-weight: bold;
      border-bottom: 1px solid #38bdf8;
      display: flex; justify-content: center; align-items: center; position: relative;
      -webkit-app-region: drag; user-select: none;
    }
    .header-title { font-size: 15px; color: #38bdf8; }
    .window-controls {
      position: absolute; right: 10px; display: flex; gap: 4px; -webkit-app-region: no-drag;
    }
    .win-btn {
      background: rgba(51, 65, 85, 0.8); border: 1px solid #475569; color: #94a3b8;
      cursor: pointer; font-size: 12px; padding: 2px 8px; border-radius: 4px; line-height: 1.5;
      transition: all 0.15s;
    }
    .win-btn:hover { background: #475569; color: #fff; }
    .win-btn.close:hover { background: #ef4444; border-color: #ef4444; color: #fff; }

    .chat-container {
      flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
    }
    .msg {
      max-width: 82%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; word-wrap: break-word;
    }
    .msg-user { align-self: flex-end; background: #0ea5e9; color: #fff; border-bottom-right-radius: 3px; }
    .msg-ai   { align-self: flex-start; background: #1e293b; color: #e2e8f0; border-bottom-left-radius: 3px; border: 1px solid #334155; }
    .msg-system {
      align-self: center; background: rgba(51, 65, 85, 0.5); color: #94a3b8;
      font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 1px solid #475569; max-width: 90%;
    }
    .msg-escalate {
      align-self: flex-start; background: rgba(56, 189, 248, 0.08); color: #38bdf8;
      border: 1px solid #38bdf8; border-radius: 12px; padding: 12px 15px; font-size: 13px; max-width: 85%;
    }
    .btn-escalate {
      background: #0ea5e9; color: #fff; border: none; padding: 8px 14px; border-radius: 6px;
      font-weight: bold; cursor: pointer; margin-top: 10px; display: block; width: 100%; font-size: 13px;
      transition: background 0.15s;
    }
    .btn-escalate:hover { background: #0284c7; }
    .btn-escalate:disabled { background: #475569; cursor: not-allowed; }

    .input-area {
      padding: 12px 15px; background: rgba(30, 41, 59, 0.95); display: flex; gap: 8px; align-items: flex-end;
      border-top: 1px solid #334155;
    }
    textarea {
      flex: 1; padding: 9px 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff;
      resize: none; font-family: inherit; font-size: 13px; min-height: 38px; max-height: 100px; overflow-y: auto;
    }
    textarea:focus { outline: none; border-color: #38bdf8; }

    .attach-btn {
      padding: 0; width: 38px; height: 38px; background: #1e293b; color: #94a3b8;
      border: 1px solid #334155; border-radius: 8px; font-weight: bold; cursor: pointer;
      font-size: 20px; line-height: 38px; text-align: center; transition: all 0.15s; flex-shrink: 0;
    }
    .attach-btn:hover { background: #334155; color: #fff; }

    .send-btn {
      padding: 0 18px; height: 38px; background: #0ea5e9; color: #fff; border: none;
      border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; flex-shrink: 0;
      transition: background 0.15s;
    }
    .send-btn:hover { background: #0284c7; }
    .send-btn:disabled { background: #475569; cursor: not-allowed; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header" data-tauri-drag-region>
    <span class="header-title" style="display: flex; align-items: center;">
      <img src="./assets/logo.png" style="width: 20px; height: 20px; border-radius: 4px; margin-right: 6px;"> 
      MKT IT Helpdesk
    </span>
    <div class="window-controls">
      <button class="win-btn close" id="btn-close-ticket" style="display:none; margin-right: 15px; border-color:#22c55e; color:#22c55e;" title="Selesai & Tutup Tiket">✔ Selesai</button>
      <button class="win-btn" id="btn-minimize" title="Minimize">─</button>
      <button class="win-btn close" id="btn-close" title="Tutup">✕</button>
    </div>
  </div>
  <div class="chat-container" id="chat">
    <div class="msg msg-ai">Halo! Selamat datang di IT Helpdesk. Ada kendala yang bisa saya bantu hari ini? Laporan Anda akan langsung segera kami proses 😊</div>
  </div>
  <div class="input-area">
    <button class="attach-btn" id="btn-attach" title="Lampirkan Foto/Dokumen">+</button>
    <textarea id="msgInput" rows="1" placeholder="Ketik pesan... (Shift+Enter untuk baris baru)" autofocus></textarea>
    <button class="send-btn" id="btn-send">Kirim</button>
  </div>

  <script>
    // ── Tauri v1 API ───────────────────────────────────────────────
    const { invoke }           = window.__TAURI__.tauri;
    const { appWindow }        = window.__TAURI__.window;
    const { open: openDialog } = window.__TAURI__.dialog;

    // ── DOM refs ───────────────────────────────────────────────────
    const chat    = document.getElementById('chat');
    const input   = document.getElementById('msgInput');
    const btnSend = document.getElementById('btn-send');

    // ── Window Controls (Fix #5) ───────────────────────────────────
    document.getElementById('btn-minimize').addEventListener('click', () => {
      appWindow.minimize().catch(console.error);
    });
    document.getElementById('btn-close').addEventListener('click', () => {
      appWindow.hide().catch(console.error);
    });

    // ── State ──────────────────────────────────────────────────────
    let currentTicketId = null;
    let ws              = null;
    let isLiveChatMode  = false;
    let messageCount    = 0;
    let escalateShown   = false;

    // ── Helpers ────────────────────────────────────────────────────
    function addMessage(text, role) {
      // role: 'user' | 'ai' | 'system'
      const div = document.createElement('div');
      div.className = `msg msg-${role}`;
      div.innerHTML = String(text).replace(/\n/g, '<br>');
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function addEscalationPrompt() {
      if (escalateShown) return;
      escalateShown = true;
      const div = document.createElement('div');
      div.className = 'msg-escalate';
      div.innerHTML = `
        Masalah belum terselesaikan? Anda dapat berbicara langsung dengan tim IT Helpdesk kami.
        <button class="btn-escalate" id="escalate-btn">Hubungkan ke IT Helpdesk</button>
      `;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;

      // Add event listener manually to avoid inline onclick CSP blocks
      document.getElementById('escalate-btn').addEventListener('click', requestLiveChat);
    }

    // ── Attach File (Fix #4) ───────────────────────────────────────
    document.getElementById('btn-attach').addEventListener('click', async () => {
      try {
        const selected = await openDialog({
          multiple: false,
          filters: [{
            name: 'Attachments',
            extensions: ['png', 'jpeg', 'jpg', 'gif', 'pdf', 'doc', 'docx']
          }]
        });
        if (selected) {
          const curr = input.value.trim();
          input.value = curr ? `${curr}\n[Lampiran: ${selected}]` : `[Lampiran: ${selected}]`;
          input.dispatchEvent(new Event('input'));
        }
      } catch (e) {
        console.error('File dialog error:', e);
        addMessage('Tidak dapat membuka pemilih file.', 'system');
      }
    });

    // ── Auto-resize textarea ───────────────────────────────────────
    input.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    let liveChatInterval = null;

    // ── Live Chat Escalation (Fix #3) ──────────────────────────────
    async function requestLiveChat() {
      const escalateBtn = document.getElementById('escalate-btn');
      if (!currentTicketId) {
        addMessage('❌ Tidak ada tiket aktif. Silakan kirim pesan terlebih dahulu.', 'system');
        return;
      }
      if (escalateBtn) { escalateBtn.disabled = true; escalateBtn.textContent = 'Menghubungkan...'; }
      addMessage('Meminta koneksi Live Chat ke tim IT Helpdesk...', 'system');

      try {
        // Step 1: Escalate ticket via Rust (bypasses CSP/Mixed Content)
        await invoke('escalate_ticket', { ticketId: currentTicketId });
        
        isLiveChatMode = true;
        if (escalateBtn) { escalateBtn.textContent = '✅ Terhubung'; escalateBtn.disabled = true; }
        addMessage('✅ Anda sudah terhubung dengan IT Helpdesk. Silakan sampaikan pertanyaan Anda.', 'ai');

        // Step 2: Start polling for new messages
        let lastMessageCount = 0;
        liveChatInterval = setInterval(async () => {
          if (!isLiveChatMode) {
            clearInterval(liveChatInterval);
            return;
          }
          try {
            const messages = await invoke('poll_chat_messages', { ticketId: currentTicketId });
            if (messages.length > lastMessageCount) {
              const newMessages = messages.slice(lastMessageCount);
              lastMessageCount = messages.length;
              
              for (const data of newMessages) {
                // only show agent messages, since user messages are added directly locally
                if (data.sender === 'AGENT') {
                  addMessage(data.content, 'ai');
                  appWindow.unminimize().catch(() => {});
                  appWindow.show().catch(() => {});
                  appWindow.setFocus().catch(() => {});
                  if (window.__TAURI__.notification) {
                    window.__TAURI__.notification.sendNotification({
                      title: 'IT Helpdesk', body: data.content.substring(0, 100)
                    });
                  }
                }
              }
            }
          } catch (err) {
            console.error('Polling error', err);
          }
        }, 3000); // poll every 3 seconds

      } catch (e) {
        console.error('Escalate error:', e);
        addMessage(`❌ Gagal mengaktifkan Live Chat: ${e}`, 'system');
        if (escalateBtn) { escalateBtn.disabled = false; escalateBtn.textContent = 'Coba Lagi'; }
      }
    }

    // ── Close Ticket (Fix #1) ──────────────────────────────────────
    document.getElementById('btn-close-ticket').addEventListener('click', async () => {
      if (!currentTicketId) return;
      if (!confirm("Apakah Anda yakin ingin menutup tiket ini? (Menandakan masalah sudah selesai)")) return;
      
      try {
        await invoke('close_customer_ticket', { ticketId: currentTicketId });
        addMessage('✅ Tiket telah berhasil ditutup. Terima kasih!', 'system');
        
        isLiveChatMode = false;
        if (liveChatInterval) clearInterval(liveChatInterval);
        document.getElementById('btn-close-ticket').style.display = 'none';
        currentTicketId = null;
      } catch (e) {
        addMessage(`❌ Gagal menutup tiket: ${e}`, 'system');
      }
    });

    // ── Send Message ───────────────────────────────────────────────
    async function sendMessage() {
      let text = input.value.trim();
      if (!text) return;

      // Extract attachment path if exists
      let attachmentPath = null;
      const attachRegex = /\[Lampiran:\s*([^\]]+)\]/;
      const match = text.match(attachRegex);
      if (match) {
        attachmentPath = match[1];
        if (!currentTicketId) {
            addMessage('❌ Silakan kirim pesan teks terlebih dahulu sebelum melampirkan file.', 'system');
            input.value = text.replace(attachRegex, '').trim();
            return;
        }
      }

      addMessage(text, 'user');
      input.value = '';
      input.style.height = 'auto';
      btnSend.disabled = true;

      // Upload attachment if any
      if (attachmentPath) {
        const loadingUpload = addMessage('Sedang mengunggah file...', 'system');
        try {
            const uploadUrl = await invoke('upload_attachment', { filePath: attachmentPath, ticketId: currentTicketId });
            text = text.replace(attachRegex, `[Lampiran: ${uploadUrl}]`);
            loadingUpload.style.display = 'none';
        } catch (e) {
            loadingUpload.innerHTML = `❌ Gagal mengunggah file: ${e}`;
            btnSend.disabled = false;
            return;
        }
      }

      // Live Chat mode → send via Rust HTTP (bypasses CSP/Mixed Content)
      if (isLiveChatMode) {
        try {
          await invoke('send_live_chat', { ticketId: currentTicketId, message: text });
        } catch(e) {
          addMessage(`❌ Gagal mengirim pesan: ${e}`, 'system');
        } finally {
          btnSend.disabled = false;
        }
        return;
      }

      // AI Chat mode
      messageCount++;
      btnSend.disabled = true;
      const loading = addMessage('Mohon ditunggu, laporan Anda sedang kami analisis...', 'ai');

      try {
        const response = await invoke('send_chat_message', { message: text });
        loading.innerHTML = String(response.reply).replace(/\n/g, '<br>');

        if (response.ticket_id && response.ticket_id !== '') {
          currentTicketId = response.ticket_id;
          document.getElementById('btn-close-ticket').style.display = 'block';
        }

        if (messageCount >= 2) {
          addEscalationPrompt();
        }
      } catch (e) {
        loading.innerHTML = `❌ Gagal terhubung ke server: ${e}`;
      } finally {
        btnSend.disabled = false;
      }
    }

    // ── Event Listeners ────────────────────────────────────────────
    btnSend.addEventListener('click', sendMessage);

    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
